-   time: 4:40 PM - 5:10 PM
    description: TBD
    speaker: Andy Pavlo
    affiliation: Carnegie Mellon University
    isKeynote: false
    bio: |
        Andy Pavlo is an Associate Professor with Indefinite Tenure of Databaseology in the Computer Science Department at Carnegie Mellon University. He was the co-founder of the OtterTune start-up and record label, but then it died. He is currently the co-founder of "SO-YOU-DONT-HAVE-TO INCORPORATED'); DROP TABLE companies; --". His goal is to achieve a database-centric lifestyle.
    description: "Databases: The Final Boss of Agents"
    abstract: |
        Large language models (LLMs) are evolving into autonomous agents that can reason, plan, and act over complex systems. We contend that databases pose the hardest and most important challenge for agents, due to their unforgiving correctness and performance requirements. This talk presents research on using agents for databases in two ways. The first part focuses on tuning agents that automatically optimize database configurations, including physical design (e.g., indexes), system knobs, and query execution strategies. The second part shifts to coding agents as collaborators in building database systems themselves. As part of this talk, we will discuss our successes and failures in using agents across both efforts and what is needed to automate them further.
    img: pavlo.jpg
    web: https://www.cs.cmu.edu/~pavlo/

-   time: 5:10 PM - 5:40 PM
    description: "UpDown: Breaking through the ceiling on Graph Computing Performance"
    speaker: Andrew Chien
    bio: |
      Andrew is an ACM Fellow (2004), IEEE Fellow (2006), AAAS Fellow (2007), and an NSF Young Investigator (1994). He has received numerous awards and recognitions for his research. He has served on the Advisory Committee for the NSF Computing, Information, Science and Engineering (CISE) Directorate, the NSF Office of Advanced Cyberinfrastructure (OAC), and on DARPA's Information Science and Technology (ISAT) study group. He served as Editor-in-Chief for Communications of the ACM (CACM) from 2017-2022, and served as Intel Vice President of Research from 2005-2010, and also on Advisory Boards of numerous Universities (Stanford, University of California - Berkeley, University of Washington, Ecole Polytechnique Federale Lausanne, University of Virginia), Government Agencies (National Science Foundation, Department of Energy), the Computing Research Association (CRA), and numerous companies (Intel, Samsung, Huawei, Lancium).
    abstract: |
      <p>Graph computations are challenging for programming and performance due to low data-reuse and irregular data, achieving poor performance on CPU’s and GPU’s.   The UpDown System radically improves both programmability and performance.  UpDown architecture enables fine-grained parallelism: 1-cycle thread creation and management, 1-cycle messages.  And, split-transaction DRAM access that unlocks the power of HBM’s massive memory bandwidth, under software control.  We will describe how UpDown’s KVMSR+UDWeave framework and global address space enables high-level programming of fine-grained parallelism.</p>

      <p>UpDown performance on skewed-graph computations is 100x vs multicore CPU’s (single-node), and scales to 1,000 and 10,000-fold speedup on BFS, Pagerank, Triangle Count, K-truss and more.  Straightup GPU comparisons show 10-60x speedup.  Comparison to supercomputers show 10-1000x ISO-power performance advantages.</p>

      <p>The UpDown system was created under IARPA’s AGILE program, and is being commercialized in a Chicago-based startup.  This startup is doing leading edge hardware design, including HBM and co-packaged optics with the goal of revolutionizing intelligence/graph analytics, network cybersecurity, financial fraud, and graphRAG + future AI/ML.</p>
    affiliation: UChicago
    img: chien.jpeg
    web: http://people.cs.uchicago.edu/~aachien/lssg/people/andrew-chien/
    isKeynote: false

-   time: 5:40 PM - 6:10 PM
    speaker: Bill Gropp
    description: Performance Engineering for Parallel Systems
    abstract: |
        The end of Dennard or frequency scaling in computer processors nearly twenty years ago has caused a transformation in computing. Innovations in computer architecture have enabled continued improvements in performance, but at the cost of increasing software and algorithmic complexity. Software has also undergone major transformations, making it both easier and harder to exploit the changes in hardware. This talk will provide some background on the transformations in computing over the last two decades and discuss how performance engineering can help guide the developments of algorithms and applications in this rapidly changing environment. I will close with several challenges for system software developers.
    bio: |
        William Gropp is a professor in the Siebel School of Computing and Data Science at the University of Illinois Urbana‑Champaign, where he holds a Grainger Distinguished Chair in Engineering. He earned his Ph.D. in Computer Science from Stanford University and previously held positions at Yale University and Argonne National Laboratory. Gropp’s research spans parallel computing, scientific software, and numerical methods for partial differential equations, with influential contributions to widely used HPC software and standards. From 2016 to 2025, he served as Director of the National Center for Supercomputing Applications. He now chairs the Computing Community Consortium for the Computing Research Association. He is a Fellow of AAAS, ACM, IEEE, and SIAM, a member of the National Academy of Engineering, and a recipient of multiple major awards in high‑performance computing.
    affiliation: UIUC
    web: https://wgropp.cs.illinois.edu/
    img: gropp.jpg
    isKeynote: false

