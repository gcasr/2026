-   time: 2:25 PM - 2:45 PM
    description: Reliability-Aware Design and Optimization of Quantum Circuits on NISQ Devices
    speaker: Jindi Wu
    web: https://jindi0.github.io/
    img: wu.jpeg
    bio: |
        Jindi Wu is an Assistant Professor in the School of Computing at DePaul University. Her research focuses on quantum computing and its intersections with machine learning, security, and privacy, with particular emphasis on quantum machine learning, error modeling and mitigation, circuit compilation, and quantum networks.
    abstract: |
        Noisy Intermediate-Scale Quantum (NISQ) devices pose significant challenges for reliable quantum computation, making it difficult to design circuits that perform well under realistic noise and hardware constraints. A key limitation is the lack of efficient, accurate, and interpretable methods for estimating circuit reliability without relying on costly quantum execution. This talk presents a lightweight and scalable framework for reliability estimation in noisy quantum circuits. The approach models how noise accumulates and propagates throughout circuit execution, enabling efficient, state-independent evaluation of circuit robustness. Building on this capability, the talk highlights how reliability estimation can guide two important tasks. First, in quantum ansatz design, reliability-aware evaluation helps identify circuit structures that are more robust on noisy quantum hardware. Second, in circuit compilation and optimization, the framework enables more informed transformations that mitigate the impact of noise during execution.
    affiliation: DePaul
    isKeynote: false

