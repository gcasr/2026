-   time: 12:45 PM - 1:00 PM
    description: Scheduling with Massively Heterogeneous Resource Requirements
    speaker: Izzy Grosof
    web: https://isaacg1.github.io/
    bio: |
      Izzy Grosof is an assistant professor at Northwestern University, in Industrial Engineering. They study stochastic queueing theory, with a focus on scheduling and resource allocation. Their research has received Best Paper awards from INFORMS,ACM SIGMETRICS and IFIP Performance.
    abstract: |
      In modern computing systems, jobs resource requirements are massively heterogenous by default. Schedulers must allocate CPU, GPU, memory, and network resources, to name but a few. While some systems, such as cloud VM schedulers, allocate a handful of standardized resource bundles, many systems are flexible to exact user requirements, coping with the resulting heterogeneity. Existing queueing-theoretic performance analysis cannot handle this heterogeneity.

      I will present a family of scheduling policies designed to cope with practical resource heterogeneity, with proven optimal throughput and low simulated latency on datacenter trace data. 
    img: grosof.jpg 
    affiliation: Northwestern
    isKeynote: false

-   time: 1:00 PM - 1:15 PM
    speaker: Kexin Pei
    web: https://sites.google.com/site/kexinpeisite/
    img: pei.jpg
    bio: |
        Kexin Pei is a Neubauer Family Assistant Professor at the Department of Computer Science, The University of Chicago. He received my PhD at Department of Computer Science, Columbia University. He is broadly interested in Security, Software Engineering, and Machine Learning, with a focus on automated code reasoning to improve the security and reliability of software systems. He gets most excited about developing intelligent systems that understand code semantics and can precisely reason about program behaviors, allowing them to reliably and efficiently analyze, detect, and fix software bugs and vulnerabilities.
    description: Synthesizing Fine-grained State Checks for Curriculum Fuzzing
    abstract: |
      Fuzzing enables many security applications, such as detecting vulnerabilities, confirming vulnerabilities by generating exploits, debugging system crashes and performance issues, and validating patches. While fuzzing essentially features a brute-force search, most research focuses on code reasoning to develop additional feedback that makes the search more efficient. For example, a typical feedback is code coverage, which serves as a proxy to measure progress towards reaching potential bugs, while being very easy to analyze and collect. However, such guidance is sometimes too sparse or indirect to reliably measure progress, especially when a long chain of implicit preconditions guards the specific bug. In contrast, more sophisticated feedbacks are often tailored for specific bug types and thus might not generalize to diverse bug types and programs.

      <p>In this talk, I'll introduce our recent effort in building a code agent to reason about semantically meaningful progress-capturing predicates as fine-grained, curriculum feedback to improve fuzzing efficiency. These predicates, inserted as source-level instrumentation into the program, provide semantically meaningful checkpoints that both prune unpromising executions and reward incremental progress. By shifting the LLM’s role from end-to-end input-level generation to local predicate synthesis, we reduce the long-range reasoning burden on the model, while enabling verifiable predicate synthesis via symbolic execution. We show that our system, Locus, substantially improves the efficiency of eight state-of-the-art fuzzers, achieving up to 41.6× speedup in reaching target sites and discovering new previously unknown bugs. We also demonstrate that the same philosophy can facilitate the synthesis of performance-stressing predicates, enabling efficient performance testing.</p>
    affiliation: UChicago
    isKeynote: false

-   time: 1:15 PM - 1:30 PM
    description: Scalable Video Conferencing using SDN Principles
    speaker: Oliver Michel
    web: https://olivermichel.github.io
    img: michel.jpeg
    bio: |
      Oliver Michel is an Assistant Professor of Computer Science at the Illinois Institute of Technology. He received a Ph.D. in Computer Science from the University of Colorado Boulder, advised by Professor Eric Keller, and a B.Sc. in Computer Science from the University of Vienna. Prior to joining IIT, he was an Associate Research Scholar at Princeton University working with Professor Jennifer Rexford.  His research focuses on measuring and optimizing networks for emerging, low-latency, interactive networked applications, such as AR/VR and video conferencing. His measurement studies and system designs span the entire stack from rich, user-facing applications to the physical-layer intricacies of wireless access networks. Michel’s work has been published in top-tier venues, including SIGCOMM, NSDI, IMC, ATC, and HotNets.
    abstract: |
      Real-time communications applications such as video conferencing face an unwavering surge in traffic, stressing their underlying infrastructure in unprecedented ways. This work rethinks the key building block for conferencing infrastructures — selective forwarding units (SFUs). SFUs relay and adapt media streams between participants and, today, run in software on general-purpose servers. Our main insight, discerned from dissecting the operation of production SFU servers, is that SFUs largely mimic traditional packet-processing operations such as dropping and forwarding. Guided by this, we present Scallop, an SDN-inspired SFU that decouples video-conferencing applications into a hardware-based data plane for latency-sensitive and frequent media operations, and a software control plane for the (infrequent) remaining tasks, such as analyzing feedback signals and session management. Scallop is a general design that is suitable for a variety of hardware platforms, including programmable switches and SmartNICs. Our Tofino-based implementation fully supports WebRTC and delivers 7-422× improved scaling over a 32-core commodity server, while reaping performance improvements by cutting forwarding-induced latency by 26×.
    affiliation: Illinois Tech
    isKeynote: false

-   time: 1:30 PM - 1:45 PM
    description: Improving Confidence in Static Analysis Tools via Metamorphic Testing
    speaker: Austin Mordahl
    affiliation: UIC
    img: mordahl.jpg
    web: https://www.cs.uic.edu/~amordahl
    abstract: |
      As software gets larger and more complex, it becomes more and more important to thoroughly verify that it is free from critical errors. Static analysis tools are well-suited to this task, but as complex pieces of software themselves, they may have bugs that compromise the accuracy and reliability of the results. These tools are difficult to test because of the oracle problem, i.e., it is difficult to determine what the correct output of a static analysis for a non-trivial program should be. Metamorphic testing has emerged as a common approach to overcome the oracle problem. In metamorphic testing, related inputs are fed to the software under test, with the expectation that there should be some observable relation between the outputs. In this talk, we will explore approaches to metamorphic testing of static analysis tools, in order to find bugs and ultimately make these tools more reliable and correct.
    bio: |
      Austin Mordahl is an Assistant Professor at the University of Illinois Chicago as of November 2024. His research interests are in software testing and program analysis. He has focused on transforming software quality assurance (SQA) processes (such as fuzzing and static analysis) to make them more accurate and accessible. His work has applied approaches like testing, static analysis, and machine learning towards this goal.
    isKeynote: false

